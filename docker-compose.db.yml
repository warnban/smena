# Сервер БД — только PostgreSQL
# Запуск: скопируйте на сервер БД, задайте POSTGRES_PASSWORD в .env рядом, затем:
#   docker compose -f docker-compose.db.yml up -d

services:
  postgres:
    image: postgres:16-alpine
    container_name: smena-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: smena
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: smena_crm
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smena -d smena_crm"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
