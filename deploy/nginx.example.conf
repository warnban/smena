# Пример nginx для app.ВАШ-ДОМЕН.ru (на сервере приложения)
# /etc/nginx/sites-available/smena-crm

server {
    listen 80;
    server_name app.example.ru example.ru dev.example.ru;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 12M;
    }
}

# После certbot:
# certbot --nginx -d example.ru -d app.example.ru -d dev.example.ru
