services:
  postgres:
    image: postgres:16-alpine
    container_name: smena-crm-postgres
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: smena_crm
    ports:
      - '5433:5432'
    volumes:
      - postgres_data_crm:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data_crm:
